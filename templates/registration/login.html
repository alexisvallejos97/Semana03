{% extends 'base.html' %}

{% block title %}Iniciar Sesión - Laudesciende{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-8rem)]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full gradient-bg mb-4">
                <i class="fas fa-box-open text-white text-3xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-800">Bienvenido</h2>
            <p class="text-gray-600 mt-2">Ingresa tus credenciales para continuar</p>
        </div>
        
        {% if form.errors %}
        <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded">
            <div class="flex items-center">
                <i class="fas fa-exclamation-circle text-red-500 mr-2"></i>
                <p class="text-red-700">Usuario o contraseña incorrectos</p>
            </div>
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-1"></i> Usuario
                </label>
                <input type="text" name="username" id="id_username" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                       placeholder="Tu usuario" required autofocus>
            </div>
            
            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-1"></i> Contraseña
                </label>
                <input type="password" name="password" id="id_password" 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
                       placeholder="Tu contraseña" required>
            </div>

            <button type="submit" 
                    class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition transform hover:scale-105">
                <i class="fas fa-sign-in-alt mr-2"></i> Ingresar
            </button>
        </form>

        <input type="hidden" name="next" value="{{ next }}">
    </div>
</div>
{% endblock %}
